name: Monorepo CI - Mobile & Web E2E Test Reports

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  mobile-ci:
    name: Android Mobile CI & Report
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
        cache-dependency-path: android/build.gradle.kts

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew
      working-directory: ./android

    - name: Run Kotlin Unit Tests
      run: ./gradlew test
      working-directory: ./android

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Mobile Excel Test Report
      run: python3 generate_test_report.py
      working-directory: ./android

    - name: Upload Mobile Excel Report
      uses: actions/upload-artifact@v4
      with:
        name: Android_E2E_Test_Report
        path: android/E2E_Test_Report.xlsx

  web-ci:
    name: React Web CI & Report
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Web Dependencies
      run: npm install --legacy-peer-deps
      working-directory: ./web

    - name: Run Jest Web Tests
      run: npm test -- --watchAll=false
      working-directory: ./web
      env:
        CI: true

    - name: Build Web Application
      run: npm run build
      working-directory: ./web
      env:
        CI: false

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Web Excel Test Report
      run: python3 generate_web_test_report.py
      working-directory: ./web

    - name: Upload Web Excel Report
      uses: actions/upload-artifact@v4
      with:
        name: Web_E2E_Test_Report
        path: web/E2E_Web_Test_Report.xlsx
