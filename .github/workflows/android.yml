name: Android CI & E2E Test Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Run Tests & Generate Report
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Run Kotlin Unit Tests
      run: ./gradlew test

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Excel Test Case Report
      run: python3 generate_test_report.py

    - name: Upload Excel Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: E2E_Test_Report
        path: E2E_Test_Report.xlsx
